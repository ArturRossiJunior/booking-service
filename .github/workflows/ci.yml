name: CI/CD Pipeline - Booking Service

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Dar permissão ao Maven Wrapper
      run: chmod +x mvnw

    - name: Rodar Testes Automatizados
      run: ./mvnw clean test

    - name: Build da Imagem Docker
      run: docker build -t booking-service .
